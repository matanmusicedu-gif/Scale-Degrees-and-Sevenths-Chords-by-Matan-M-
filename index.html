<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>משחק דרגות הרמוניות</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Hebrew:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f0f4f8;--ink:#111827;--hdr:#1e3a5f;--acc:#1d60b5;--accl:#dbeafe;--accm:#93c5fd;--teal:#0f766e;--grn:#15803d;--red:#b91c1c;--purp:#7c3aed;--bdr:#d1d5db;--gray:#6b7280;--card:#fff}
body{font-family:'Noto Serif Hebrew',serif;background:var(--bg);color:var(--ink);direction:rtl;min-height:100vh;display:flex;flex-direction:column;-webkit-text-size-adjust:100%;font-size:15px}
.pal-0{--bg:#eff6ff;--hdr:#1e3a5f;--acc:#1d60b5;--accl:#dbeafe;--accm:#93c5fd;--teal:#0f766e}
.pal-1{--bg:#f0fdf4;--hdr:#14532d;--acc:#166534;--accl:#dcfce7;--accm:#86efac;--teal:#15803d}
.pal-2{--bg:#faf5ff;--hdr:#4c1d95;--acc:#7c3aed;--accl:#f3e8ff;--accm:#c4b5fd;--teal:#6d28d9}
.pal-3{--bg:#fff1f2;--hdr:#881337;--acc:#be123c;--accl:#ffe4e6;--accm:#fda4af;--teal:#9f1239}
.pal-4{--bg:#fff7ed;--hdr:#7c2d12;--acc:#c2410c;--accl:#ffedd5;--accm:#fdba74;--teal:#ea580c}
.pal-5{--bg:#fefce8;--hdr:#713f12;--acc:#a16207;--accl:#fef9c3;--accm:#fde047;--teal:#ca8a04;--ink:#1c1917}
.pal-6{--bg:#ecfeff;--hdr:#164e63;--acc:#0e7490;--accl:#cffafe;--accm:#67e8f9;--teal:#0891b2}
.pal-7{--bg:#f0fdf9;--hdr:#134e4a;--acc:#0f766e;--accl:#ccfbf1;--accm:#5eead4;--teal:#0d9488}
.pal-8{--bg:#fdf4ff;--hdr:#3b0764;--acc:#a855f7;--accl:#fae8ff;--accm:#d8b4fe;--teal:#9333ea}
.topbar{background:var(--hdr);color:#fff;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--acc);flex-shrink:0;transition:background .4s,border-color .4s}
.top-title{font-size:.88rem;font-weight:700}.top-sub{font-size:.65rem;color:var(--accm);margin-top:1px}
.stu-row{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.stu-row label{font-size:.65rem;color:var(--accm);white-space:nowrap}
.stu-inp{padding:2px 6px;border-radius:5px;border:1px solid var(--accm);background:#ffffff22;color:#fff;font-family:inherit;font-size:.72rem;outline:none;text-align:right}
.stu-inp::placeholder{color:#64748b}
.q-ctr{background:#ffffff22;border-radius:14px;padding:2px 9px;font-size:.7rem;font-weight:700;color:#e0f2fe;white-space:nowrap;margin-top:3px}
.aud-panel{background:var(--hdr);padding:5px 12px 6px;display:flex;flex-wrap:wrap;gap:7px;align-items:center;justify-content:center;border-bottom:2px solid rgba(255,255,255,.1)}
.aud-ctrl{display:flex;align-items:center;gap:4px;white-space:nowrap}
.aud-ctrl label{font-size:.64rem;font-weight:700;color:var(--accm)}
.aud-ctrl input[type=range]{-webkit-appearance:none;height:3px;border-radius:2px;background:rgba(255,255,255,.25);outline:none;cursor:pointer;width:65px}
.aud-ctrl input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accm);cursor:pointer}
.aud-ctrl select{background:#ffffff22;border:1px solid var(--accm);border-radius:4px;color:#fff;font-family:inherit;font-size:.67rem;padding:1px 4px;outline:none}
.aud-ctrl select option{color:#111;background:#fff}
.aud-val{font-size:.63rem;color:#fff;min-width:22px}
.piano-toggle{display:flex;align-items:center;gap:4px;padding:3px 9px;border:1px solid var(--accm);border-radius:12px;color:var(--accm);background:transparent;font-family:inherit;font-size:.63rem;font-weight:700;cursor:pointer}
.piano-toggle.open{background:var(--accm);color:var(--hdr)}
.piano-wrap{background:#1e293b;padding:8px 14px;display:flex;justify-content:center;overflow-x:auto;border-bottom:2px solid rgba(255,255,255,.08)}
.ls-bar{background:var(--hdr);padding:3px 14px 4px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,.08)}
.ls-track{flex:1;height:7px;background:rgba(255,255,255,.12);border-radius:4px;overflow:hidden;max-width:380px}
.ls-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#3b82f6,#1d4ed8);transition:width .6s}
.ls-lbl{font-size:.67rem;font-weight:700;color:var(--accm);white-space:nowrap}
.prog-bar{height:3px;background:#334155;flex-shrink:0}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--teal));transition:width .3s}
.main{flex:1;overflow-y:auto;padding:12px 10px;max-width:740px;margin:0 auto;width:100%;-webkit-overflow-scrolling:touch}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 12px;border-radius:18px;font-size:.69rem;font-weight:700;margin-bottom:8px;border:1.5px solid var(--accm);background:var(--accl);color:var(--acc)}
.card{background:var(--card);border-radius:12px;box-shadow:0 2px 14px rgba(0,0,0,.09);padding:18px 16px;width:100%;position:relative;margin-bottom:4px}
.ltr{direction:ltr;unicode-bidi:embed;display:inline-block;font-family:'Times New Roman',serif}
.mc-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:10px}
.mc-list{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.mc-btn{padding:10px 8px;border:2px solid var(--bdr);border-radius:8px;background:var(--card);font-family:inherit;font-size:.84rem;font-weight:700;cursor:pointer;transition:all .12s;color:var(--ink);text-align:center;line-height:1.4}
.mc-list .mc-btn{text-align:right;padding:9px 12px}
.mc-btn:hover:not(:disabled){border-color:var(--acc);background:var(--accl)}
.mc-btn.correct{border-color:var(--grn)!important;background:#dcfce7!important;color:#166534!important}
.mc-btn.wrong{border-color:var(--red)!important;background:#fee2e2!important;color:#991b1b!important}
.mc-btn:disabled{opacity:.7;cursor:default}
/* Part 1 feedback table */
.fb-tbl{width:100%;border-collapse:collapse;margin-top:4px;font-size:.78rem}
.fb-tbl td{padding:5px 9px;border-bottom:1px solid rgba(0,0,0,.07);vertical-align:middle}
.fb-tbl tr:last-child td{border-bottom:none}
.fb-tbl .lbl{color:var(--gray);font-size:.7rem;font-weight:700;white-space:nowrap;width:80px;direction:rtl}
.fb-tbl .val{font-weight:700;direction:ltr;font-family:'Times New Roman',serif;font-size:.85rem}
.fb-tbl .val-rtl{font-weight:700;direction:rtl;font-size:.82rem}
.fb-scale{font-family:monospace;background:rgba(0,0,0,.07);border-radius:4px;padding:2px 7px;font-size:.72rem;direction:ltr;display:inline-block;margin-top:3px}
.pre-play-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 16px;background:var(--teal);color:#fff;border:none;border-radius:16px;font-family:inherit;font-size:.79rem;font-weight:700;cursor:pointer;margin-top:9px}
.pre-play-btn.playing{background:#dc2626;animation:pulse .6s infinite alternate}
@keyframes pulse{from{opacity:1}to{opacity:.6}}
.fb{border-radius:8px;padding:10px 13px;font-size:.82rem;line-height:1.65;text-align:right;display:none;margin-top:9px}
.fb.ok{background:#dcfce7;color:#166534;border:2px solid #86efac;display:block}
.fb.err{background:#fee2e2;color:#991b1b;border:2px solid #fca5a5;display:block}
.fb.partial{background:var(--accl);color:var(--acc);border:2px solid var(--accm);display:block}
.fb.info{background:#fef3c7;color:#92400e;border:1.5px solid #fde68a;display:block}
/* write */
.write-title{font-size:.9rem;font-weight:700;line-height:1.7;margin-bottom:8px}
.inv-hint{background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:7px 11px;font-size:.76rem;color:#92400e;margin-bottom:10px;line-height:1.65}
.scale-hint{background:#fef9c3;border:1px solid #fde68a;border-radius:5px;padding:5px 10px;font-size:.74rem;color:#92400e;margin-bottom:8px;direction:ltr;font-family:monospace}
.ans-area{background:var(--accl);border:2px solid var(--accm);border-radius:8px;padding:10px 12px;margin-top:8px}
.ans-lbl{font-size:.62rem;font-weight:700;color:var(--acc);letter-spacing:.04em;margin-bottom:7px}
/* note input — v22 styles */
.ni-wrap{margin-bottom:8px}
.ni-row{display:flex;align-items:center;gap:4px;margin-bottom:5px;flex-wrap:wrap;direction:ltr}
.ni-label{font-size:.65rem;font-weight:700;color:var(--gray);width:44px;direction:rtl;text-align:right;flex-shrink:0}
.lbtn{width:30px;height:30px;border-radius:4px;border:1px solid #94a3b8;background:#fff;font-size:.88rem;font-weight:700;cursor:pointer;color:#1e293b;transition:all .1s;font-family:'Times New Roman',serif}
.lbtn:hover{background:var(--acc);color:#fff;border-color:var(--acc)}
.abtn{padding:3px 9px;border-radius:4px;border:1px solid #94a3b8;background:#fff;font-size:.95rem;font-weight:700;cursor:pointer;color:#374151;transition:all .1s;font-family:'Times New Roman',serif}
.abtn:hover{background:#475569;color:#fff}
.abtn.active{background:#1e293b;color:#fff;border-color:#1e293b}
.abtn.sharp{color:#b45309}.abtn.sharp.active{background:#b45309;border-color:#b45309}
.abtn.flat{color:#7c3aed}.abtn.flat.active{background:#7c3aed;border-color:#7c3aed}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin:6px 0;direction:ltr;min-height:26px;align-items:center}
.chip{display:inline-flex;align-items:center;gap:2px;background:#e0f2fe;border:1.5px solid #0ea5e9;border-radius:16px;padding:2px 6px 2px 8px;font-size:.82rem;font-weight:700;color:#0c4a6e;font-family:'Times New Roman',serif}
.chip-name{min-width:18px;text-align:center}
.chip-oct{font-size:.6rem;color:#0369a1;font-family:monospace;line-height:1}
.chip-up,.chip-dn{width:15px;height:15px;border-radius:3px;border:none;cursor:pointer;font-size:.6rem;display:flex;align-items:center;justify-content:center;font-weight:900;flex-shrink:0;line-height:1}
.chip-up{background:#bae6fd;color:#0369a1}.chip-up:hover{background:#0369a1;color:#fff}
.chip-dn{background:#bae6fd;color:#0369a1}.chip-dn:hover{background:#0369a1;color:#fff}
.chip-del{width:15px;height:15px;border-radius:50%;border:none;cursor:pointer;background:#fecdd3;color:#be123c;font-size:.65rem;display:flex;align-items:center;justify-content:center;font-weight:900;flex-shrink:0}
.chip-del:hover{background:#be123c;color:#fff}
.chip-empty{font-size:.75rem;color:#94a3b8;font-style:italic}
.ni-actions{display:flex;gap:5px;align-items:center;direction:ltr;flex-wrap:wrap;margin-top:4px}
.ubtn{padding:2px 9px;border-radius:9px;border:1px solid #fca5a5;background:#fee2e2;font-size:.68rem;font-weight:700;cursor:pointer;color:#991b1b;font-family:inherit}
.ubtn:hover{background:#991b1b;color:#fff}
.cbtn{padding:2px 9px;border-radius:9px;border:1px solid var(--bdr);background:#f1f5f9;font-size:.68rem;font-weight:700;cursor:pointer;color:var(--gray);font-family:inherit}
.cbtn:hover{background:#475569;color:#fff}
.play-write-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 14px;background:var(--teal);color:#fff;border:none;border-radius:16px;font-family:inherit;font-size:.76rem;font-weight:700;cursor:pointer;margin-top:7px}
.play-write-btn.playing{background:#dc2626}
.staff-outer{background:#fff;border-radius:5px;border:1px solid var(--bdr);overflow:hidden;margin-top:7px}
.staff-svg{display:block;width:100%;height:auto}
.chk-row{display:flex;align-items:center;gap:8px;margin-top:9px;flex-wrap:wrap}
.chk-btn{padding:8px 19px;background:var(--hdr);color:#fff;border:none;border-radius:6px;font-family:inherit;font-size:.84rem;font-weight:700;cursor:pointer}
.chk-btn:disabled{opacity:.4;cursor:default}
.chk-btn:hover:not(:disabled){background:var(--acc)}
.next-btn{padding:8px 28px;background:var(--teal);color:#fff;border:none;border-radius:6px;font-family:inherit;font-size:.84rem;font-weight:700;cursor:pointer;margin-top:9px;display:none}
.next-btn.show{display:inline-block}
.flag-btn{position:absolute;top:6px;left:6px;background:none;border:none;font-size:.88rem;cursor:pointer;opacity:.35;padding:3px}
.flag-btn:hover,.flag-btn.active{opacity:1}
/* table */
.dtable{width:100%;border-collapse:collapse;font-size:.74rem;direction:ltr;margin:8px 0}
.dtable th,.dtable td{border:1px solid var(--bdr);padding:5px 4px;text-align:center;vertical-align:middle;min-width:44px}
.dtable th{background:#f1f5f9;font-weight:700;font-size:.7rem}
.rh{font-size:.82rem;font-weight:700;color:var(--acc)}
.ex-row td{background:#f0fdf4}
.ex-rl{background:#bbf7d0!important;color:#14532d;font-weight:700;direction:rtl;text-align:right;padding:5px 7px!important;font-size:.7rem}
.ce{font-size:.75rem;font-weight:700;color:#1f2937}
.cq{font-size:.58rem;color:var(--gray);display:block}
.hint-cell{background:#fffbeb!important;border:2px solid #f59e0b!important}
.hc{font-size:.8rem;font-weight:700;color:#b45309}
.hs{font-size:.57rem;color:#d97706;display:block}
.a-cell{background:var(--accl)!important;border:1.5px solid var(--accm)!important;padding:2px!important}
.a-cell input{width:100%;border:none;background:transparent;text-align:center;font-family:'Times New Roman',serif;font-size:.74rem;color:var(--ink);outline:none;padding:2px 1px}
.rn-inp{width:100%;border:none;background:transparent;font-family:inherit;font-size:.7rem;font-weight:700;color:var(--acc);outline:none;direction:rtl}
.rl-a{background:var(--accl)!important;border:1.5px solid var(--accm)!important;direction:rtl;text-align:right;padding:4px 6px!important}
/* bottom nav */
.botbar{background:var(--hdr);border-top:2px solid var(--acc);padding:6px 8px 8px;position:sticky;bottom:0;flex-shrink:0}
.bot-inner{max-width:740px;margin:0 auto;display:flex;flex-direction:column;gap:3px}
.bot-lbl{font-size:.57rem;color:var(--accm);text-align:center;letter-spacing:.04em}
.nav-dots{display:flex;gap:2px;justify-content:center;flex-wrap:wrap;align-items:center}
.ndot{width:24px;height:24px;border-radius:4px;background:rgba(255,255,255,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:700;color:rgba(255,255,255,.45);transition:all .18s;border:2px solid transparent;flex-shrink:0;position:relative}
.ndot:hover{background:rgba(255,255,255,.2);color:#fff}
.ndot.cur{background:var(--acc);color:#fff;border-color:var(--accm);transform:scale(1.1)}
.ndot.done-ok{background:#166534;color:#fff}
.ndot.done-err{background:#991b1b;color:#fff}
.ndot.done-p{background:#1e40af;color:#fff}
.ndot.flagged::after{content:'🚩';position:absolute;top:-6px;right:-3px;font-size:.5rem}
.sec-div{width:1px;height:18px;background:rgba(255,255,255,.2);flex-shrink:0;margin:0 1px}
/* score */
.sc-card{background:var(--card);border-radius:12px;padding:20px 16px;box-shadow:0 2px 14px rgba(0,0,0,.09);width:100%}
.sc-big{font-size:2.8rem;font-weight:700;color:var(--acc);line-height:1}
.sc-bar{height:8px;background:rgba(0,0,0,.08);border-radius:4px;overflow:hidden;margin:9px 0 3px}
.sc-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--acc),var(--teal));transition:width 1.2s ease}
.part-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--bdr);font-size:.8rem}
.part-row:last-child{border-bottom:none}
.tag{display:inline-block;border-radius:4px;padding:2px 7px;font-size:.68rem;font-weight:700;margin:2px}
.tag-ok{background:#dcfce7;color:#166534}
.tag-err{background:#fee2e2;color:#991b1b}
.tag-warn{background:#fef3c7;color:#92400e}
.msg-box{border-radius:8px;padding:10px 13px;text-align:center;margin:8px 0;font-size:.83rem;font-weight:700;line-height:1.55}
.msg-great{background:linear-gradient(135deg,#fef3c7,#dcfce7);border:2px solid #86efac;color:#166534}
.msg-ok{background:var(--accl);border:2px solid var(--accm);color:var(--acc)}
.msg-retry{background:#fee2e2;border:2px solid #fca5a5;color:#991b1b}
.abtab{width:100%;border-collapse:collapse;margin-top:8px;font-size:.73rem;text-align:right}
.abtab th{background:var(--hdr);color:#fff;padding:4px 7px;font-weight:700}
.abtab td{padding:4px 7px;border-bottom:1px solid var(--bdr)}
.abtab tr:nth-child(even) td{background:var(--accl)}
.pdf-btn{padding:8px 20px;background:var(--purp);color:#fff;border:none;border-radius:6px;font-family:inherit;font-size:.82rem;font-weight:700;cursor:pointer;margin-top:9px}
.rst-btn{padding:8px 22px;background:var(--hdr);color:#fff;border:none;border-radius:6px;font-family:inherit;font-size:.82rem;font-weight:700;cursor:pointer;margin-top:6px}
.wm{text-align:center;padding:7px 0 5px;font-size:.67rem;color:var(--gray);opacity:.5;flex-shrink:0;font-style:italic}

@media print{
  @page{size:A4 portrait;margin:8mm}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .topbar,.aud-panel,.piano-wrap,.ls-bar,.prog-bar,.botbar,.next-btn,.play-write-btn,.pre-play-btn,.chk-btn,.flag-btn,.wm,.pdf-btn,.rst-btn,.ni-row,.ni-actions,.inv-hint,.scale-hint,.badge,.part-row+.part-row~div:last-child{display:none!important}
  body{background:#fff!important;font-size:11px;min-height:unset}
  .main{overflow:visible;padding:4px;max-width:100%}
  .card,.sc-card{box-shadow:none!important;break-inside:avoid;page-break-inside:avoid;margin-bottom:6px}
  .sc-card{transform:scale(0.92);transform-origin:top center;padding:10px}
  .sc-big{font-size:2rem}
  .abtab{font-size:.65rem}
  html,body{height:auto;overflow:visible}
}
@media(max-width:480px){.mc-grid{grid-template-columns:1fr 1fr}.ndot{width:20px;height:20px}}
</style>
</head>
<body class="pal-0">

<div class="topbar">
  <div><div class="top-title">משחק דרגות הרמוניות</div><div class="top-sub">חלק א׳ · ב׳ · ג׳ · ד׳</div></div>
  <div style="text-align:left">
    <div class="stu-row">
      <label>שם:</label><input id="sname" class="stu-inp" placeholder="שם" style="width:90px">
      <label>כיתה:</label><input id="sclass" class="stu-inp" placeholder="כיתה" style="width:50px">
    </div>
    <div class="q-ctr" id="q-ctr">שאלה 1 / 25</div>
  </div>
</div>

<div class="aud-panel">
  <div class="aud-ctrl"><label>🐢</label>
    <input type="range" id="spd" min="0.4" max="2" step="0.1" value="1"
      oninput="AS.speed=+this.value;document.getElementById('spd-v').textContent=this.value+'×'">
    <span id="spd-v" class="aud-val">1×</span></div>
  <div class="aud-ctrl"><label>🔊</label>
    <input type="range" id="vol" min="0.02" max="0.35" step="0.01" value="0.14" oninput="AS.volume=+this.value"></div>
  <div class="aud-ctrl"><label>🎹</label>
    <select id="tmb" onchange="AS.timbre=this.value">
      <option value="piano">פסנתר</option><option value="organ">אורגן</option>
      <option value="strings">כינור</option><option value="bell">פעמון</option><option value="marimba">מרימבה</option>
    </select></div>
  <button class="piano-toggle" id="piano-toggle" onclick="togglePiano()">🎹 הצג מקלדת</button>
</div>

<div class="piano-wrap" id="piano-wrap" style="display:none">
  <svg id="piano-svg" viewBox="0 0 232 76" width="464" height="152" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<div class="ls-bar">
  <span class="ls-lbl">ציון: <span id="ls-pct">0%</span></span>
  <div class="ls-track"><div class="ls-fill" id="ls-fill" style="width:0%"></div></div>
</div>
<div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
<div class="main" id="main"></div>

<div class="botbar">
  <div class="bot-inner">
    <div class="bot-lbl">ניווט · 🚩 לסמן לחזרה</div>
    <div class="nav-dots" id="nav-dots"></div>
  </div>
</div>
<div class="wm">Matan Margolin · משחק דרגות הרמוניות</div>

const TOP_Y  = 30;    // y of top staff line (F5)
const GAP    = 18;    // pixels between adjacent lines
const SVG_H  = 160;   // total SVG height — larger for readability
const SVG_W  = 700;   // viewBox width
const CLEF_FS = 74;   // unused - kept for reference
const CLEF_X  = 1;
// Treble clef as base64 PNG (rendered via Python/FreeSerif, guaranteed cross-platform)
// Image is 50×110 SVG units, G4 curl at 52.7% from top = G4 line in staff
const CLEF_Y  = 82;
const CLEF_FONT = "serif"; // fallback only
const NOTE_START_X = 60; // first note x (after wider clef)
const NOTE_SP = 55;       // horizontal spacing between notes
const WNR_X   = 10;       // whole-note ellipse rx — larger
const WNR_Y   = 7;        // whole-note ellipse ry — larger

// Staff position index (half-steps from top line):
// 0=F5(top), 1=E5, 2=D5, 3=C5, 4=B4(middle), 5=A4, 6=G4(2nd), 7=F4, 8=E4(bottom), 9=D4, 10=C4(ledger)
// Each octave = 7 positions
const BASE_POS = {C:10,D:9,E:8,F:7,G:6,A:5,B:4}; // default octave (4/5 split)

function staffPos(letter, octaveAdj) {
  return BASE_POS[letter] - (octaveAdj || 0) * 7;
}
function posY(p) { return TOP_Y + p * (GAP / 2); }

// ============================================================
//  DRAW STAFF
// ============================================================
function drawStaff(svgEl, notes) {
  const ns = 'http://www.w3.org/2000/svg';
  svgEl.setAttribute('viewBox', `0 -20 ${SVG_W} ${SVG_H + 20}`);
  svgEl.setAttribute('preserveAspectRatio', 'xMinYMid meet');
  svgEl.innerHTML = '';

  // 5 staff lines — full width
  for (let i = 0; i < 5; i++) {
    const y = TOP_Y + i * GAP;
    mkLine(svgEl, 0, y, SVG_W, y, '#2a2a2a', 1.1);
  }
  // Left bar line
  mkLine(svgEl, 0.5, TOP_Y, 0.5, TOP_Y+4*GAP, '#2a2a2a', 2);
  // Right bar line
  mkLine(svgEl, SVG_W-0.5, TOP_Y, SVG_W-0.5, TOP_Y+4*GAP, '#2a2a2a', 2);

  // Treble clef — embedded PNG, curl precisely on G4 (2nd line from bottom)
  const clef = document.createElementNS(ns, 'image');
  clef.setAttribute('x', '0');
  clef.setAttribute('y', '-24');
  clef.setAttribute('width', '50');

function drawWholeNote(svgEl, nx, ny, acc, pos) {
  const ns = 'http://www.w3.org/2000/svg';

  // Ledger lines
  const ledgerPositions = [];
  if (pos >= 10) ledgerPositions.push(10);
  if (pos >= 12) ledgerPositions.push(12);
  if (pos >= 14) ledgerPositions.push(14);
  if (pos <= -2) ledgerPositions.push(-2);
  if (pos <= -4) ledgerPositions.push(-4);
  ledgerPositions.forEach(lp => {
    mkLine(svgEl, nx-WNR_X-5, posY(lp), nx+WNR_X+5, posY(lp), '#2a2a2a', 1.2);
  });

  // Accidental
  if (acc && acc !== 'n') {
    const sym = acc === '#' ? '♯' : '♭';
    const a = document.createElementNS(ns, 'text');
    a.setAttribute('x', nx - WNR_X - 11);
    a.setAttribute('y', ny + 4);
    a.setAttribute('font-size', '17');
    a.setAttribute('font-family', "'Times New Roman',serif");
    a.setAttribute('fill', '#1d4ed8');
    a.setAttribute('text-anchor', 'middle');
    a.textContent = sym;
    svgEl.appendChild(a);
  }

  // Whole note: open oval, slightly tilted
  const e = document.createElementNS(ns, 'ellipse');
  e.setAttribute('cx', nx); e.setAttribute('cy', ny);
  e.setAttribute('rx', WNR_X); e.setAttribute('ry', WNR_Y);
  e.setAttribute('fill', '#fff');
  e.setAttribute('stroke', '#1d4ed8'); e.setAttribute('stroke-width', '2');
  e.setAttribute('transform', `rotate(-16,${nx},${ny})`);
  svgEl.appendChild(e);

  // Inner hole (oval cutout to make it look like real whole note)
  const hole = document.createElementNS(ns, 'ellipse');
  hole.setAttribute('cx', nx); hole.setAttribute('cy', ny);
  hole.setAttribute('rx', WNR_X - 3); hole.setAttribute('ry', WNR_Y - 2);
  hole.setAttribute('fill', '#fff');
  hole.setAttribute('transform', `rotate(20,${nx},${ny})`);
  svgEl.appendChild(hole);

  // Note name label (small, below)
  const lbl = document.createElementNS(ns, 'text');
  lbl.setAttribute('x', nx);
  lbl.setAttribute('y', ny + 20);
  lbl.setAttribute('text-anchor', 'middle');

// ============================================================
//  NOTE INPUT STATE
// ============================================================
const NS = {}; // NS[staffId] = [{uid, letter, acc, octaveAdj}]
let uid_ctr = 0;
const activeAcc = {}; // staffId → '' | '#' | 'b'

function initNI(staffId) {
  NS[staffId] = [];
  activeAcc[staffId] = '';
}

function addNote(staffId, letter) {
  const acc = activeAcc[staffId] || '';
  let oa = 0;
  if (NS[staffId].length > 0) {
    // auto-place above lowest existing note
    const loMidi = Math.min(...NS[staffId].map(n => noteToMidiSimple(n.letter, n.acc, n.octaveAdj)));
    const nm = noteToMidiSimple(letter, acc, 0);
    if (nm <= loMidi) { oa = 1; if (noteToMidiSimple(letter, acc, 1) <= loMidi) oa = 2; }
  }
  NS[staffId].push({ uid: uid_ctr++, letter, acc, octaveAdj: oa });
  refreshNI(staffId);
}

function delNote(staffId, uid) {
  NS[staffId] = NS[staffId].filter(n => n.uid !== uid);
  refreshNI(staffId);
}

function changeOctave(staffId, uid, delta) {
  const n = NS[staffId].find(n => n.uid === uid);
  if (!n) return;
  const newAdj = (n.octaveAdj || 0) + delta;
  // Limit range to keep on visible staff
  if (newAdj < -2 || newAdj > 2) return;
  n.octaveAdj = newAdj;
  refreshNI(staffId);
}

function undoLast(staffId) {
  NS[staffId].pop();
  refreshNI(staffId);
}

function clearAll(staffId) {
  NS[staffId] = [];
  refreshNI(staffId);
}

function refreshNI(staffId) {
  const chipsEl = document.getElementById('chips-' + staffId);
  if (chipsEl) {
    chipsEl.innerHTML = '';
    const notes = NS[staffId];
    if (notes.length === 0) {
      const e = document.createElement('span');
      e.className = 'chip-empty'; e.textContent = 'טרם הוזנו צלילים';
      chipsEl.appendChild(e);
    } else {
      notes.forEach(n => chipsEl.appendChild(makeChip(staffId, n)));
    }
  }
  const svgEl = document.getElementById('staff-' + staffId);
  if (svgEl) drawStaff(svgEl, NS[staffId]);
}

function makeChip(staffId, note) {
  const accSym = note.acc === '#' ? '♯' : note.acc === 'b' ? '♭' : '';
  const octLabel = note.octaveAdj > 0 ? '+'+ note.octaveAdj : note.octaveAdj < 0 ? String(note.octaveAdj) : '';

  const chip = document.createElement('span');
  chip.className = 'chip';

  const nameEl = document.createElement('span');
  nameEl.className = 'chip-name';
  nameEl.textContent = note.letter + accSym;
  chip.appendChild(nameEl);

  if (octLabel) {
    const octEl = document.createElement('span');
    octEl.className = 'chip-oct';
    octEl.textContent = octLabel;
    chip.appendChild(octEl);
  }

  // Up arrow
  const upBtn = document.createElement('button');
  upBtn.className = 'chip-up'; upBtn.textContent = '▲'; upBtn.title = 'אוקטבה למעלה';
  upBtn.onclick = () => changeOctave(staffId, note.uid, 1);
  chip.appendChild(upBtn);

  // Down arrow
  const dnBtn = document.createElement('button');
  dnBtn.className = 'chip-dn'; dnBtn.textContent = '▼'; dnBtn.title = 'אוקטבה למטה';
  dnBtn.onclick = () => changeOctave(staffId, note.uid, -1);
  chip.appendChild(dnBtn);

  // Delete
  const delBtn = document.createElement('button');
  delBtn.className = 'chip-del'; delBtn.textContent = '×'; delBtn.title = 'מחק';
  delBtn.onclick = () => delNote(staffId, note.uid);
  chip.appendChild(delBtn);

  return chip;
}

function buildNI(staffId, container) {
  initNI(staffId);

  // Accidental row
  const accRow = document.createElement('div');
  accRow.className = 'ni-row';
  accRow.innerHTML = '<span class="ni-label">סימן:</span>';

  // Letter row
  const letRow = document.createElement('div');

// ── MIDI helper (simple, for auto-octave placement) ──────────────────────
const MIDI_LET = {C:0,D:2,E:4,F:5,G:7,A:9,B:11};
function noteToMidiSimple(letter, acc, octAdj) {
  let m = 12 * (4 + (octAdj||0) + 1) + MIDI_LET[letter];
  if (acc==='#') m++; if (acc==='b') m--;
  return m;
}

function getCtx(){if(!audioCtx||audioCtx.state==='closed')audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();return audioCtx;}
function stopAll(){if(audioCtx){try{audioCtx.close();}catch(e){}}audioCtx=null;activePlayId++;}
const TMBR={
  piano:{h:[1,2,3,4,5,6],a:[1,.5,.25,.12,.06,.03],dc:2.8,at:0.008},
  organ:{h:[1,2,3,4,6,8],a:[1,.4,.3,.2,.15,.1],dc:4.0,at:0.015},
  strings:{h:[1,2,3,4,5,6,7],a:[1,.6,.5,.35,.25,.15,.08],dc:3.5,at:0.12},

  marimba:{h:[1,3,5,7],a:[1,.15,.08,.03],dc:1.4,at:0.004}

function mf(m){return 440*Math.pow(2,(m-69)/12);}
function playN(m,t0,ctx){
  const tm=TMBR[AS.timbre]||TMBR.piano;
  const mg=ctx.createGain();mg.gain.value=AS.volume;mg.connect(ctx.destination);
  tm.h.forEach((h,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.value=mf(m)*h;g.gain.setValueAtTime(0,t0);g.gain.linearRampToValueAtTime(tm.a[i],t0+tm.at);g.gain.exponentialRampToValueAtTime(0.0001,t0+tm.dc);o.connect(g);g.connect(mg);o.start(t0);o.stop(t0+tm.dc+0.05);});
}

// ── VOICE LEADING ────────────────────────────────────────────────────────
// Returns new chord array where each chord is voiced to minimize movement from previous
function voiceLead(chords) {
  if (!chords || chords.length <= 1) return chords;
  const LO=52, HI=83; // E3–B5 playable range

  function voicings(midis) {
    const pcs = midis.map(m => m%12);
    const result = [];
    function gen(i, prev, cur) {
      if (i===pcs.length){result.push([...cur]);return;}
      for (let oct=3;oct<=6;oct++){
        const m=oct*12+pcs[i];
        if(m>=LO&&m<=HI&&m>=prev) gen(i+1, m, [...cur, m]);
      }
    }
    gen(0, LO, []);
    return result;
  }

  const out = [chords[0]];
  for (let i=1;i<chords.length;i++){
    const prev = out[i-1];
    const cands = voicings(chords[i]);
    if(!cands.length){out.push(chords[i]);continue;}
    let best=cands[0], bestCost=Infinity;
    for (const c of cands){
      const n=Math.min(prev.length,c.length);
      let cost=0;
      for(let j=0;j<n;j++) cost+=Math.abs(prev[j]-c[j]);
      // Penalise extreme registers
      for(const m of c){if(m<55)cost+=6;if(m>79)cost+=3;}
      if(cost<bestCost){bestCost=cost;best=c;}
    }
    out.push(best);
  }
  return out;
}

// Block-chord playback: all notes at once, 0.8s between chords, with voice leading
function playHarmProg(chords, onDone){
  stopAll();const myId=++activePlayId;const ctx=getCtx();
  const vled = voiceLead(chords); // apply voice leading
  const gap=0.8/AS.speed;
  let t=ctx.currentTime+0.05;
  vled.forEach(midis=>{
    midis.forEach(m=>playN(m,t,ctx));
    hlPiano(midis,Math.min(gap*900,2500));
    t+=gap;
  });
  const tm=TMBR[AS.timbre]||TMBR.piano;
  const totalMs=(t-ctx.currentTime+tm.dc)*1000+200;
  setTimeout(()=>{if(activePlayId===myId&&onDone)onDone();},totalMs);
}

// Block single chord
function playHarmChord(midis, onDone){
  stopAll();const myId=++activePlayId;const ctx=getCtx();
  const t=ctx.currentTime+0.05;
  midis.forEach(m=>playN(m,t,ctx));
  hlPiano(midis,2200);
  const tm=TMBR[AS.timbre]||TMBR.piano;
  setTimeout(()=>{if(activePlayId===myId&&onDone)onDone();},(tm.dc+0.3)*1000);
}

// Arpeggio for write section playback
function playArpChord(midis, onDone){
  stopAll();const myId=++activePlayId;const ctx=getCtx();
  const sp=AS.speed;const tm=TMBR[AS.timbre]||TMBR.piano;const step=0.28/sp;
  const now=ctx.currentTime+0.05;
  midis.forEach((m,i)=>playN(m,now+i*step,ctx));
  const holdAt=now+(midis.length-1)*step+0.6;
  midis.forEach(m=>playN(m,holdAt,ctx));
  hlPiano(midis,2000);
  const totalMs=((holdAt+tm.dc)-now)*1000+200;
  setTimeout(()=>{if(activePlayId===myId&&onDone)onDone();},totalMs);
}

let curVar=0,cur=0,score=0,tblRow=0;
let P1=[],P2=[];
let results,given,flagged,mcAtt;
const TOTAL=30;

function initVariant(v){
  curVar=v%3;
  P1=P1_BASE.map(q=>{
    const idxs=[0,1,2,3];
    for(let i=3;i>0;i--){const j=Math.floor(Math.random()*(i+1));[idxs[i],idxs[j]]=[idxs[j],idxs[i]];}
    const correct=q.opts[q.ans];const no=idxs.map(i=>q.opts[i]);
    return {...q,opts:no,ans:no.indexOf(correct)};
  });
  P2=P2_VARS[curVar].map((idx,i)=>({...P2_POOL[idx],qLabel:'שאלה '+(11+i)}));
  tblRow=v%3;
  results=new Array(TOTAL).fill(null);
  given=new Array(TOTAL).fill(null);
  flagged=new Set();
  mcAtt=new Array(TOTAL).fill(0);
  score=0;
}

function getPage(i){
  if(i<10) return {type:'p1',data:P1[i]};
  if(i<17) return {type:'write',data:P2[i-10],writeIdx:i-10};
  if(i===17) return {type:'table'};
  if(i<22) return {type:'p4a',data:P4A[i-18]};
  return {type:'p4b',data:P4B[i-22]};
}
const MAX_SCORE=()=>29; // 10+7+4+8

function updScore(){
  const pct=Math.min(100,Math.round(score/MAX_SCORE()*100));
  const f=document.getElementById('ls-fill'),l=document.getElementById('ls-pct');
  if(l)l.textContent=pct+'%';
  if(f){f.style.width=pct+'%';f.style.background=pct>=90?'linear-gradient(90deg,#f59e0b,#f97316)':pct>=70?'linear-gradient(90deg,#22c55e,#16a34a)':'linear-gradient(90deg,#3b82f6,#1d4ed8)';}
}
function rec(res,giv){
  const old=results[cur];results[cur]=res;given[cur]={giv,isOk:res==='ok',isP:res==='partial'};
  if(!old){if(res==='ok')score+=1;else if(res==='partial')score+=0.5;}
  updateNav();updScore();
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render(pg){
  if(pg!==undefined)cur=pg;
  stopAll(); // stop any playing audio on navigation
  if(cur>=TOTAL){renderScore();return;}
  document.body.className='pal-'+(cur%9);
  document.getElementById('q-ctr').textContent=`שאלה ${cur+1} / ${TOTAL}`;
  document.getElementById('prog-fill').style.width=`${(cur/TOTAL)*100}%`;
  const main=document.getElementById('main');main.innerHTML='';
  const pg2=getPage(cur);
  if(pg2.type==='p1') renderP1(main,pg2.data);
  else if(pg2.type==='write') renderWrite(main,pg2.data,pg2.writeIdx);
  else if(pg2.type==='table') renderTable(main);
  else renderMC4(main,pg2.data);
  updateNav();main.scrollTop=0;
}

// ── PART 1 ────────────────────────────────────────────────────────────────
function renderP1(main,data){
  const bdg=mkEl('div','badge');bdg.innerHTML='🎯 '+data.badge;main.appendChild(bdg);
  const card=mkEl('div','card');addFlag(card);
  const ql=mkEl('div','');ql.style.cssText='font-size:.69rem;font-weight:700;color:var(--gray);margin-bottom:7px';ql.textContent=data.qLabel;card.appendChild(ql);
  const qt=mkEl('div','');qt.style.cssText='font-size:.93rem;font-weight:700;line-height:1.75;margin-bottom:3px';qt.innerHTML=data.q;card.appendChild(qt);
  const useList=data.opts.some(o=>o.length>14);
  const grid=mkEl('div',useList?'mc-list':'mc-grid');grid.id='mc-grid';
  if(results[cur]!==null){
    data.opts.forEach((opt,i)=>{const b=mkEl('button','mc-btn');b.innerHTML=opt;b.disabled=true;if(i===data.ans)b.classList.add('correct');else if(given[cur]?.giv===opt&&results[cur]==='err')b.classList.add('wrong');grid.appendChild(b);});
    card.appendChild(grid);
    const fbb=buildP1Feedback(data,results[cur]==='ok',false);card.appendChild(fbb);
  } else {
    data.opts.forEach((opt,i)=>{const b=mkEl('button','mc-btn');b.innerHTML=opt;b.onclick=()=>checkP1(b,i,opt,data,grid);grid.appendChild(b);});
    card.appendChild(grid);
    const fb=mkEl('div','fb');fb.id='fb';card.appendChild(fb);
  }
  const nb=mkNextBtn();card.appendChild(nb);if(results[cur]!==null)nb.classList.add('show');
  main.appendChild(card);
}

  staffOut.appendChild(svg);staffTd.appendChild(staffOut);staffTr.appendChild(staffTd);tbl.appendChild(staffTr);

function playWriteStaff(sid,btnEl){
  const notes=NS[sid]||[];if(!notes.length)return;
  stopAll();
  document.querySelectorAll('.play-write-btn.playing').forEach(b=>{b.classList.remove('playing');b.textContent='▶ נגן';});
  const myId=++activePlayId;const ctx=getCtx();
  const sorted=[...notes].filter(n=>MIDI_LET[n.letter]!==undefined)
    .sort((a,b)=>noteToMidiSimple(a.letter,a.acc,a.octaveAdj)-noteToMidiSimple(b.letter,b.acc,b.octaveAdj));
  const midis=sorted.map(n=>noteToMidiSimple(n.letter,n.acc,n.octaveAdj));
  if(btnEl){btnEl.classList.add('playing');btnEl.textContent='⏹ מנגן...';}
  playArpChord(midis,()=>{if(btnEl){btnEl.classList.remove('playing');btnEl.textContent='▶ נגן';}});

function checkWrite(sid,data,chkBtn){
  const notes=NS[sid]||[];const fb=document.getElementById('fb');
  if(notes.length<data.exp.length){fb.className='fb info';fb.textContent=`הזנתם ${notes.length} צלילים — נדרשים ${data.exp.length}.`;return;}
  const sorted=[...notes].sort((a,b)=>staffPos(b.letter,b.octaveAdj)-staffPos(a.letter,a.octaveAdj));
  const placed=sorted.map(n=>n.letter+(n.acc||''));
  const missing=data.exp.filter(e=>!placed.some(p=>noteEq(p,e)));
  mcAtt[cur]=(mcAtt[cur]||0)+1;
  if(missing.length>0){
    fb.className='fb err';fb.innerHTML='✗ שמות הצלילים לא נכונים. '+data.expl;
    if(mcAtt[cur]>=2){chkBtn.disabled=true;rec('err',placed.join(', '));document.getElementById('nb')?.classList.add('show');}
    else fb.innerHTML+='<br><b>ניסיון נוסף!</b>';
    return;
  }
  // Notes are correct — check bass order
  const bassOk=noteEq(placed[0],data.bass);
  if(!bassOk && mcAtt[cur]<2){
    fb.className='fb info';
    fb.innerHTML='✓ שמות הצלילים נכונים! אך בדקו את <b>סדר הצלילים — מי צריך להיות הנמוך ביותר?</b>'+
      '<br><small style="color:#92400e">רמז: '+data.invBox+'</small><br><b>ניסיון נוסף!</b>';
    return;
  }
  chkBtn.disabled=true;
  if(bassOk){fb.className='fb ok';fb.innerHTML='✓ נכון! <b>'+data.name+'</b>: '+data.expl;rec('ok',placed.join(', '));}
  else{fb.className='fb partial';fb.innerHTML=(data.inv===0?'½ חצי ניקוד — שמות הצלילים נכונים אך <b>השורש אינו הנמוך ביותר</b>.':'½ חצי ניקוד — שמות הצלילים נכונים אך <b>מצב ההיפוך לא מדויק</b>.<br>'+data.expl);rec('partial',placed.join(', '));}
  document.getElementById('nb')?.classList.add('show');
}

    d.textContent=String(i+1);d.title='שאלה '+(i+1);d.onclick=()=>render(i);wrap.appendChild(d);
  }
  const fin=mkEl('div','');fin.style.cssText='padding:2px 6px;border-radius:4px;background:rgba(255,255,255,.1);cursor:pointer;font-size:.57rem;color:rgba(255,255,255,.45);margin-right:2px;border:1px solid rgba(255,255,255,.15)';
  fin.textContent='סיכום';fin.onclick=()=>{cur=TOTAL;renderScore();};wrap.appendChild(fin);
}

// ── INIT ──────────────────────────────────────────────────────────────────
initVariant(0);
render();
</script>
</body>
</html>
